# Features / APIs tracked for adoption across the ecosystem.
# Each entry is a column in the adoption matrix. See SPEC.md §4.2 and §5.4.
#
# detection kinds:
#   pin     - inspect a dependency version specifier (from requirements.txt)
#   python  - is a Python version in the resolved support list?
#   file    - does any of the given paths exist in the repo?
#   code    - GitHub code search for present/absent patterns
#   manual  - status comes from repos.yml `feature_overrides`

features:
  - id: compas2
    label: "On COMPAS 2.x"
    kind: pin
    detect:
      package: compas
      satisfied_by: ">=2,<3"

  - id: py311
    label: "Python 3.11"
    kind: python
    detect:
      version: "3.11"

  - id: py312
    label: "Python 3.12"
    kind: python
    detect:
      version: "3.12"

  - id: py313
    label: "Python 3.13"
    kind: python
    detect:
      version: "3.13"

  - id: new-scene-api
    label: "New Scene API"
    kind: code
    detect:
      present:
        - "from compas.scene import Scene"

  - id: no-deprecated-artist
    label: "No deprecated Artist"
    kind: code
    detect:
      absent:
        - "compas.artists"

  # Migrated TO MkDocs and AWAY from Sphinx: mkdocs.yml present, no sphinx conf.py.
  - id: mkdocs
    label: "MkDocs (not Sphinx)"
    kind: file
    detect:
      any_of:
        - "mkdocs.yml"
      none_of:
        - "docs/conf.py"
        - "docs/source/conf.py"

  - id: invocations2
    label: "Uses compas_invocations2"
    kind: code
    detect:
      present:
        - "compas_invocations2"
